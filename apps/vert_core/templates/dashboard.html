{% extends "base.html" %}
{% block start %}
 
<link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
<style>
  .text{
    color: green;
    font-weight: bold;
  }
</style>
 
<div class="container mt-5">
    
    <form class="col-6 mx-auto card p-3 shadow-lg" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <h2 class="text  text-center"> Vert Dashboard </h2>
        <br>
        <h3>Add User</h3>
        <hr>
        <div class="form-group">
          <label for="exampleInputEmail1">User name</label>
          <input name="user_name" type="text" class="form-control"  required>
         </div>
        <div class="form-group">
          <label for="exampleInputPassword1"  >Additional notes</label>
          <textarea name="additional_notes" class="form-control" required ></textarea>
        </div>
        <div class="form-group">
            <label for="exampleInputPassword1">Pet Image</label>
            <input name="pet_image" type="file" class="form-control" >
          </div>
       
        <button type="submit" class="btn btn-success">Add User</button>
      </form>
 
      <hr>
      <div class="class mt-5">
        <form action="">
 
          <div class="max-auto col-6">
            <div class="form-group">
              <label for="exampleInputEmail1">Search Users</label>
              <input name="search" type="text" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary "> Search</button>
          </form>
        </div>
      </div>
      <table class="table mt-5">
        <thead>
 
          <tr>
            <th scope="col">#</th>
            <th scope="col">User name</th>
            <th scope="col">Additional notes</th>
            <th scope="col">Image</th>
            <th scope="col">Actions</th>
          </tr>
        </thead>
        <tbody>
            {% for user in users %}
          <tr>
            <th scope="row">{{forloop.counter}}</th>
            <td>{{user.user_name}}</td>
            <td>{{user.additional_notes}}</td>
            <td>
                <img src="/media/{{user.pet_image}}" style="height: 100px;"> </td>
                <td>
                    <a href="/delete_user/{{user.id }}" class="btn btn-danger m-2">Delete</a>
                    <a href="/update_user/{{user.id }}" class="btn btn-success">Update</a>
                </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
       
</div>
 
{% endblock %}
